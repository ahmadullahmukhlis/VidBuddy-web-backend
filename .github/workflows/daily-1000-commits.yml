name: Daily 1000 Commits
on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight UTC
  workflow_dispatch: # Allows you to start it manually for testing

jobs:
  make-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run 1000 Commits
        run: |
          git config --global user.name "ahmadullahmukhlis"
          git config --global user.email "nasarimukhlis@gmail.com"
          
          for i in {1..1000}
          do
            echo "Commit #$i on $(date)" >> commit_log.txt
            git add commit_log.txt
            git commit -m "Automated commit $i of 1000"
          done
          
          git push
